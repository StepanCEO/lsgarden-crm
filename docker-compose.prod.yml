services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_started

  web:
    build: ./
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DJANGO_DEBUG: "0"
      DJANGO_ALLOWED_HOSTS: "crm.lsgarden.ru,localhost,127.0.0.1"
      DJANGO_CSRF_TRUSTED_ORIGINS: "https://crm.lsgarden.ru"
      POSTGRES_DB: plant_crm
      POSTGRES_USER: plant_crm
      POSTGRES_PASSWORD: plant_crm
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    volumes:
      # Постоянное хранилище сессии Telegram-аккаунта (Telethon) — переживает пересборки.
      - ./tgdata:/app/tgdata
    depends_on:
      db:
        condition: service_healthy

  backup:
    build:
      context: ./
      dockerfile: Dockerfile.cron
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DJANGO_DEBUG: "0"
      DJANGO_ALLOWED_HOSTS: "crm.lsgarden.ru,localhost,127.0.0.1"
      POSTGRES_DB: plant_crm
      POSTGRES_USER: plant_crm
      POSTGRES_PASSWORD: plant_crm
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: plant_crm
      POSTGRES_USER: plant_crm
      POSTGRES_PASSWORD: plant_crm
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plant_crm -d plant_crm"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  caddy_data:
  caddy_config:
